services:
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ventas_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      PMA_ARBITRARY: 1
    ports:
      - "${PMA_PORT:-8081}:80"
